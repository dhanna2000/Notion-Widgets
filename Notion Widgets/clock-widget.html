<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock & Greeting</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #D87E50;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 16px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .widget {
    width: 100%;
    max-width: 340px;
    padding: 28px 24px 24px;
    background: #D87E50;
    color: white;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }
  .widget::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    pointer-events: none;
  }
  .greeting {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.85;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
    position: relative;
  }
  .name {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
    position: relative;
  }
  .time-block {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 20px;
    position: relative;
  }
  .time {
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2.5px;
    font-variant-numeric: tabular-nums;
  }
  .ampm {
    font-size: 15px;
    font-weight: 700;
    opacity: 0.75;
  }
  .date-card {
    background: white;
    color: #D87E50;
    border-radius: 18px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  .date-left .day {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    opacity: 0.6;
  }
  .date-left .full {
    font-size: 17px;
    font-weight: 800;
    margin-top: 3px;
    letter-spacing: -0.3px;
  }
  .date-right {
    font-size: 24px;
    font-weight: 800;
    background: #D87E50;
    color: white;
    min-width: 44px;
    height: 44px;
    padding: 0 8px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    box-sizing: border-box;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="greeting" id="greeting">Good morning</div>
  <div class="name" id="name">Hello 👋</div>
  <div class="time-block">
    <div class="time" id="time">--:--</div>
    <div class="ampm" id="ampm"></div>
  </div>
  <div class="date-card">
    <div class="date-left">
      <div class="day" id="dayName">--</div>
      <div class="full" id="monthName">--</div>
    </div>
    <div class="date-right" id="dayNum">--</div>
  </div>
</div>
<script>
  // ===== Customize your name here =====
  const USER_NAME = 'Hello 👋';
  // ====================================
  
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  
  document.getElementById('name').textContent = USER_NAME;
  
  function update() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    document.getElementById('time').textContent = h + ':' + m;
    document.getElementById('ampm').textContent = ampm;
    
    const hour = now.getHours();
    let greet;
    if (hour < 5) greet = 'Late night,';
    else if (hour < 12) greet = 'Good morning,';
    else if (hour < 17) greet = 'Good afternoon,';
    else if (hour < 21) greet = 'Good evening,';
    else greet = 'Good night,';
    document.getElementById('greeting').textContent = greet;
    
    document.getElementById('dayName').textContent = DAYS[now.getDay()];
    document.getElementById('monthName').textContent = MONTHS[now.getMonth()];
    document.getElementById('dayNum').textContent = now.getDate();
  }
  update();
  setInterval(update, 1000);
</script>
</body>
</html>
