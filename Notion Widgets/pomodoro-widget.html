<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 16px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .widget {
    width: 100%;
    max-width: 320px;
    padding: 24px;
    border-radius: 28px;
    background: #D87E50;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    color: white;
    box-sizing: border-box;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .mode-toggle {
    display: flex;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    padding: 3px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: 0.2s;
    font-family: inherit;
  }
  .mode-btn.active {
    background: white;
    color: #D87E50;
  }
  .timer-card {
    background: white;
    border-radius: 22px;
    padding: 22px 18px 18px;
    margin-bottom: 14px;
    text-align: center;
  }
  .ring-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 0 auto 10px;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #F5E1D4; stroke-width: 12; }
  .ring-fg {
    fill: none;
    stroke: #D87E50;
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear;
  }
  .time-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #D87E50;
  }
  .time-text .t {
    font-size: 38px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1.5px;
    font-variant-numeric: tabular-nums;
  }
  .time-text .lbl {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.55;
    margin-top: 8px;
  }
  .sessions {
    color: #D87E50;
    font-size: 12px;
    font-weight: 600;
    opacity: 0.7;
  }
  .controls { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    border: none;
    border-radius: 16px;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease;
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary { background: white; color: #D87E50; }
  .btn-secondary {
    background: transparent;
    color: white;
    border: 2px solid rgba(255, 255, 255, 0.5);
  }
</style>
</head>
<body>
<div class="widget">
  <div class="top">
    <div class="title">Pomodoro</div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="focus">Focus</button>
      <button class="mode-btn" data-mode="break">Break</button>
    </div>
  </div>
  <div class="timer-card">
    <div class="ring-wrap">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle class="ring-bg" cx="90" cy="90" r="78"></circle>
        <circle class="ring-fg" cx="90" cy="90" r="78"></circle>
      </svg>
      <div class="time-text">
        <div class="t" id="time">25:00</div>
        <div class="lbl" id="lbl">Focus</div>
      </div>
    </div>
    <div class="sessions">Session <span id="sessions">1</span> of 4</div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" id="startBtn">Start</button>
    <button class="btn btn-secondary" id="resetBtn">Reset</button>
  </div>
</div>
<script>
  const FOCUS = 25 * 60;
  const BREAK = 5 * 60;
  const CIRC = 2 * Math.PI * 78;

  let mode = 'focus';
  let total = FOCUS;
  let remaining = FOCUS;
  let running = false;
  let interval = null;
  let sessions = 1;

  const ring = document.querySelector('.ring-fg');
  ring.setAttribute('stroke-dasharray', CIRC);
  ring.setAttribute('stroke-dashoffset', 0);

  const timeEl = document.getElementById('time');
  const lblEl = document.getElementById('lbl');
  const sessionsEl = document.getElementById('sessions');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const modeBtns = document.querySelectorAll('.mode-btn');

  function render() {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    timeEl.textContent = m + ':' + s;
    lblEl.textContent = mode === 'focus' ? 'Focus' : 'Break';
    const pct = remaining / total;
    ring.setAttribute('stroke-dashoffset', CIRC * (1 - pct));
    sessionsEl.textContent = sessions;
  }

  function setMode(newMode) {
    mode = newMode;
    total = mode === 'focus' ? FOCUS : BREAK;
    remaining = total;
    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    pause();
    render();
  }

  function tick() {
    if (remaining > 0) {
      remaining--;
      render();
    } else {
      pause();
      if (mode === 'focus') {
        sessions = sessions >= 4 ? 1 : sessions + 1;
        setMode('break');
      } else {
        setMode('focus');
      }
    }
  }

  function start() {
    if (running) return;
    running = true;
    startBtn.textContent = 'Pause';
    interval = setInterval(tick, 1000);
  }

  function pause() {
    running = false;
    startBtn.textContent = 'Start';
    clearInterval(interval);
  }

  startBtn.onclick = () => running ? pause() : start();
  resetBtn.onclick = () => { pause(); remaining = total; render(); };
  modeBtns.forEach(b => b.onclick = () => setMode(b.dataset.mode));

  render();
</script>
</body>
</html>
