<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
  html {
    margin: 0; padding: 0;
    background: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    html { background: #191919; }
  }
  body {
    margin: 0;
    background: #D87E50;
    border-radius: 24px;
    display: flex;
    justify-content: center;
    align-items: stretch;
    padding: 16px;
    box-sizing: border-box;
    height: 100vh;
    overflow: hidden;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
  }
  .widget {
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
  }

  /* ===== Top bar — fixed height, flexes wide ===== */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .mode-toggle {
    display: flex;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    padding: 3px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: white;
    color: #D87E50;
  }

  /* ===== Main area — flex container that reflows ===== */
  .main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: stretch;
  }

  /* ===== Timer card — scales via container queries / aspect ratio ===== */
  .timer-card {
    background: white;
    border-radius: 22px;
    padding: 18px;
    color: #D87E50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex: 1;
    min-height: 0;
    container-type: inline-size;
  }
  .ring-wrap {
    position: relative;
    /* Ring fills its available space (capped by container width OR height) */
    width: min(100%, 60cqh);
    aspect-ratio: 1;
    max-width: 280px;
    flex-shrink: 1;
  }
  .ring-wrap svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
    display: block;
  }
  .ring-bg { fill: none; stroke: #F5E1D4; stroke-width: 8; }
  .ring-fg {
    fill: none;
    stroke: #D87E50;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear;
  }
  .time-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #D87E50;
  }
  /* Time text scales with the ring container */
  .time-text .t {
    font-size: clamp(24px, 22cqw, 64px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1.5px;
    font-variant-numeric: tabular-nums;
  }
  .time-text .lbl {
    font-size: clamp(8px, 5cqw, 14px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.55;
    margin-top: 0.6em;
  }
  .sessions {
    color: #D87E50;
    font-size: 12px;
    font-weight: 600;
    opacity: 0.7;
    flex-shrink: 0;
  }

  /* ===== Controls — own container, buttons scale ===== */
  .controls {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease;
    font-family: inherit;
    min-width: 0;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary { background: white; color: #D87E50; }
  .btn-secondary {
    background: transparent;
    color: white;
    border: 2px solid rgba(255, 255, 255, 0.5);
  }

  /* ===== Wide layout: side-by-side when iframe is 520px+ ===== */
  @media (min-width: 520px) {
    .main {
      flex-direction: row;
      gap: 16px;
    }
    .timer-card {
      flex: 1.4;
    }
    .right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      min-width: 0;
    }
    /* Controls become vertical stack when on the right */
    .controls {
      flex-direction: column;
    }
    .btn { padding: 16px; }
    /* Session counter goes into right column */
    .session-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      color: white;
    }
    .session-card .label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .session-card .value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
  }
  /* In narrow mode, session-card hides because sessions live inside timer-card */
  @media (max-width: 519px) {
    .right-col { display: contents; }
    .session-card { display: none; }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="top">
    <div class="title">Pomodoro</div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="focus">Focus</button>
      <button class="mode-btn" data-mode="break">Break</button>
    </div>
  </div>

  <div class="main">
    <div class="timer-card">
      <div class="ring-wrap">
        <svg viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="78"></circle>
          <circle class="ring-fg" cx="90" cy="90" r="78"></circle>
        </svg>
        <div class="time-text">
          <div class="t" id="time">25:00</div>
          <div class="lbl" id="lbl">Focus</div>
        </div>
      </div>
      <div class="sessions">Session <span id="sessionsInline">1</span> of 4</div>
    </div>

    <div class="right-col">
      <div class="session-card">
        <div class="label">Session</div>
        <div class="value"><span id="sessionsSide">1</span> / 4</div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="startBtn">Start</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
  const FOCUS = 25 * 60;
  const BREAK = 5 * 60;
  const CIRC = 2 * Math.PI * 78;

  let mode = 'focus';
  let total = FOCUS;
  let remaining = FOCUS;
  let running = false;
  let interval = null;
  let sessions = 1;

  const ring = document.querySelector('.ring-fg');
  ring.setAttribute('stroke-dasharray', CIRC);
  ring.setAttribute('stroke-dashoffset', 0);

  const timeEl = document.getElementById('time');
  const lblEl = document.getElementById('lbl');
  const sessionsInline = document.getElementById('sessionsInline');
  const sessionsSide = document.getElementById('sessionsSide');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const modeBtns = document.querySelectorAll('.mode-btn');

  function render() {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    timeEl.textContent = m + ':' + s;
    lblEl.textContent = mode === 'focus' ? 'Focus' : 'Break';
    const pct = remaining / total;
    ring.setAttribute('stroke-dashoffset', CIRC * (1 - pct));
    sessionsInline.textContent = sessions;
    sessionsSide.textContent = sessions;
  }

  function setMode(newMode) {
    mode = newMode;
    total = mode === 'focus' ? FOCUS : BREAK;
    remaining = total;
    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    pause();
    render();
  }

  function tick() {
    if (remaining > 0) {
      remaining--;
      render();
    } else {
      pause();
      if (mode === 'focus') {
        sessions = sessions >= 4 ? 1 : sessions + 1;
        setMode('break');
      } else {
        setMode('focus');
      }
    }
  }

  function start() {
    if (running) return;
    running = true;
    startBtn.textContent = 'Pause';
    interval = setInterval(tick, 1000);
  }

  function pause() {
    running = false;
    startBtn.textContent = 'Start';
    clearInterval(interval);
  }

  startBtn.onclick = () => running ? pause() : start();
  resetBtn.onclick = () => { pause(); remaining = total; render(); };
  modeBtns.forEach(b => b.onclick = () => setMode(b.dataset.mode));

  render();
</script>
</body>
</html>
