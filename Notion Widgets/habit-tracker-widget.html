<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  /* ===== Responsive root sizing =====
     1rem scales with iframe width.
     At ~360px wide → 1rem = 16px (design baseline).
     Clamp keeps it readable at extremes. */
  html {
    margin: 0; padding: 0;
    background: #ffffff;
    font-size: clamp(11px, 4.44vw, 56px);
  }
  @media (prefers-color-scheme: dark) {
    html { background: #191919; }
  }
  body {
    margin: 0;
    background: #D87E50;
    border-radius: 1.5rem;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 1rem;
    box-sizing: border-box;
    min-height: 100vh;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
  }
  .widget {
    width: 100%;
    padding: 1.5rem;
    background: transparent;
    color: white;
    box-sizing: border-box;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.125rem;
  }
  .title { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
  .top-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .week-label {
    background: white;
    color: #D87E50;
    padding: 0.3125rem 0.75rem;
    border-radius: 999px;
    font-size: 0.625rem;
    font-weight: 800;
    letter-spacing: 0.0625em;
  }
  .icon-btn {
    width: 1.75rem;
    height: 1.75rem;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    cursor: pointer;
    font-size: 0.8125rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
    transition: 0.15s;
    font-family: inherit;
  }
  .icon-btn:hover { background: white; color: #D87E50; }
  .done-btn {
    background: white;
    color: #D87E50;
    border: none;
    padding: 0.375rem 0.875rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.03em;
    cursor: pointer;
    font-family: inherit;
  }
  .card {
    background: white;
    border-radius: 1.375rem;
    padding: 1.125rem;
    color: #D87E50;
  }
  .day-row, .habit {
    display: grid;
    grid-template-columns: 1fr repeat(7, 1.625rem);
    gap: 0.3125rem;
    align-items: center;
  }
  .day-row {
    margin-bottom: 0.625rem;
    font-size: 0.625rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .day-row > div { text-align: center; opacity: 0.4; }
  .day-row > div.today { opacity: 1; }
  .habit { margin-bottom: 0.5rem; }
  .habit:last-child { margin-bottom: 0; }
  .habit-name {
    font-size: 0.8125rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 0.375rem;
  }
  .cell {
    width: 1.625rem; height: 1.625rem;
    border-radius: 0.5625rem;
    border: 0.125rem solid #F0D5C5;
    background: white;
    cursor: pointer;
    transition: 0.15s;
    padding: 0;
  }
  .cell:hover { border-color: #D87E50; transform: scale(1.08); }
  .cell.done {
    background: #D87E50;
    border-color: #D87E50;
  }
  .cell.today { box-shadow: 0 0 0 0.125rem white, 0 0 0 0.25rem #D87E50; }

  /* ===== Edit mode ===== */
  .habit-edit {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .habit-input {
    flex: 1;
    border: 0.125rem solid #F0D5C5;
    border-radius: 0.625rem;
    padding: 0.5rem 0.75rem;
    font-size: 0.8125rem;
    font-weight: 600;
    color: #D87E50;
    background: white;
    font-family: inherit;
    outline: none;
    min-width: 0;
  }
  .habit-input:focus { border-color: #D87E50; }
  .habit-input::placeholder { color: #E5B89A; }
  .delete-btn {
    width: 1.75rem;
    height: 1.75rem;
    border-radius: 50%;
    border: none;
    background: #F0D5C5;
    color: #D87E50;
    font-size: 0.875rem;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
    transition: 0.15s;
  }
  .delete-btn:hover { background: #D87E50; color: white; }
  .add-btn {
    width: 100%;
    border: 0.125rem dashed #F0D5C5;
    background: transparent;
    color: #D87E50;
    padding: 0.625rem;
    border-radius: 0.75rem;
    font-size: 0.8125rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 0.375rem;
    font-family: inherit;
    transition: 0.15s;
  }
  .add-btn:hover { border-color: #D87E50; background: #FCF5F0; }
  .add-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .footer {
    margin-top: 0.875rem;
    padding-top: 0.875rem;
    border-top: 0.0625rem solid #F0D5C5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #D87E50;
  }
  .stat { font-size: 0.75rem; font-weight: 600; opacity: 0.8; }
  .stat .big {
    font-size: 1.125rem;
    font-weight: 800;
    opacity: 1;
  }
  .streak { font-weight: 700; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="widget">
  <div class="top">
    <div class="title" id="titleText">Habits</div>
    <div class="top-right">
      <button class="icon-btn" id="editBtn" aria-label="Edit habits" title="Edit habits">✎</button>
      <button class="done-btn hidden" id="doneBtn">Done</button>
      <div class="week-label" id="weekLabel">THIS WEEK</div>
    </div>
  </div>
  <div class="card">
    <div class="day-row" id="dayLabels"></div>
    <div id="habits"></div>
    <button class="add-btn hidden" id="addBtn">+ Add habit</button>
    <div class="footer" id="footer">
      <div class="stat"><span class="big" id="completedCount">0</span> / <span id="totalCount">0</span> done</div>
      <div class="stat streak">🔥 <span class="big" id="streak">0</span></div>
    </div>
  </div>
</div>
<script>
  const HABITS_KEY = 'habit-tracker-habits-v2';
  const STATE_KEY = 'habit-tracker-state-v2';
  const MAX_HABITS = 6;
  const DAY_LABELS = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

  const now = new Date();
  const todayIdx = (now.getDay() + 6) % 7;

  function getWeekKey() {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    return d.toISOString().slice(0, 10);
  }
  const currentWeek = getWeekKey();

  function newId() {
    return 'h_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  let habits;
  try {
    const saved = JSON.parse(localStorage.getItem(HABITS_KEY) || 'null');
    if (Array.isArray(saved) && saved.length > 0) habits = saved;
  } catch (e) {}
  if (!habits) {
    habits = [
      { id: newId(), name: 'Workout' },
      { id: newId(), name: 'Read' },
      { id: newId(), name: 'No phone AM' }
    ];
  }

  let state = {};
  try {
    const saved = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
    if (saved.week === currentWeek) state = saved.data || {};
  } catch (e) {}
  habits.forEach(h => {
    if (!Array.isArray(state[h.id]) || state[h.id].length !== 7) {
      state[h.id] = [false, false, false, false, false, false, false];
    }
  });

  function saveHabits() {
    try { localStorage.setItem(HABITS_KEY, JSON.stringify(habits)); } catch (e) {}
  }
  function saveState() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify({ week: currentWeek, data: state })); } catch (e) {}
  }

  let mode = 'view';

  const editBtn = document.getElementById('editBtn');
  const doneBtn = document.getElementById('doneBtn');
  const weekLabel = document.getElementById('weekLabel');
  const titleText = document.getElementById('titleText');
  const dayLabels = document.getElementById('dayLabels');
  const habitsEl = document.getElementById('habits');
  const addBtn = document.getElementById('addBtn');
  const footer = document.getElementById('footer');

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderViewMode() {
    titleText.textContent = 'Habits';
    editBtn.classList.remove('hidden');
    doneBtn.classList.add('hidden');
    weekLabel.classList.remove('hidden');
    addBtn.classList.add('hidden');
    footer.classList.remove('hidden');
    dayLabels.classList.remove('hidden');

    dayLabels.innerHTML = '<div></div>' + DAY_LABELS.map((d, i) =>
      `<div class="${i === todayIdx ? 'today' : ''}">${d}</div>`
    ).join('');

    habitsEl.innerHTML = habits.map(h => `
      <div class="habit">
        <div class="habit-name">${escapeHtml(h.name)}</div>
        ${state[h.id].map((done, di) =>
          `<button class="cell${done ? ' done' : ''}${di === todayIdx ? ' today' : ''}" data-id="${h.id}" data-d="${di}" aria-label="${escapeHtml(h.name)} ${DAY_LABELS[di]}"></button>`
        ).join('')}
      </div>
    `).join('');

    habitsEl.querySelectorAll('.cell').forEach(c => {
      c.onclick = () => {
        const id = c.dataset.id, di = +c.dataset.d;
        state[id][di] = !state[id][di];
        saveState();
        renderViewMode();
      };
    });

    let completed = 0;
    habits.forEach(h => state[h.id].forEach(d => { if (d) completed++; }));
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('totalCount').textContent = habits.length * 7;

    let streak = 0;
    if (habits.length > 0) {
      for (let d = todayIdx; d >= 0; d--) {
        if (habits.every(h => state[h.id][d])) streak++;
        else break;
      }
    }
    document.getElementById('streak').textContent = streak;
  }

  function renderEditMode() {
    titleText.textContent = 'Edit Habits';
    editBtn.classList.add('hidden');
    doneBtn.classList.remove('hidden');
    weekLabel.classList.add('hidden');
    addBtn.classList.remove('hidden');
    footer.classList.add('hidden');
    dayLabels.classList.add('hidden');

    addBtn.disabled = habits.length >= MAX_HABITS;
    addBtn.textContent = habits.length >= MAX_HABITS
      ? `Max ${MAX_HABITS} habits`
      : '+ Add habit';

    habitsEl.innerHTML = habits.map(h => `
      <div class="habit-edit" data-id="${h.id}">
        <input class="habit-input" data-id="${h.id}" type="text"
               value="${escapeHtml(h.name)}" maxlength="30"
               placeholder="Habit name">
        <button class="delete-btn" data-id="${h.id}" aria-label="Delete">×</button>
      </div>
    `).join('');

    habitsEl.querySelectorAll('.habit-input').forEach(inp => {
      const commit = () => {
        const id = inp.dataset.id;
        const habit = habits.find(h => h.id === id);
        if (!habit) return;
        const v = inp.value.trim();
        habit.name = v || 'New habit';
        if (!v) inp.value = habit.name;
        saveHabits();
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
      });
    });

    habitsEl.querySelectorAll('.delete-btn').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        habits = habits.filter(h => h.id !== id);
        delete state[id];
        saveHabits();
        saveState();
        renderEditMode();
      };
    });
  }

  function setMode(m) {
    mode = m;
    if (m === 'edit') renderEditMode();
    else renderViewMode();
  }

  editBtn.onclick = () => setMode('edit');
  doneBtn.onclick = () => {
    document.activeElement?.blur?.();
    setMode('view');
  };
  addBtn.onclick = () => {
    if (habits.length >= MAX_HABITS) return;
    const id = newId();
    habits.push({ id, name: 'New habit' });
    state[id] = [false, false, false, false, false, false, false];
    saveHabits();
    saveState();
    renderEditMode();
    setTimeout(() => {
      const inputs = habitsEl.querySelectorAll('.habit-input');
      const last = inputs[inputs.length - 1];
      if (last) { last.focus(); last.select(); }
    }, 0);
  };

  setMode('view');
</script>
</body>
</html>
